                switch(currentMenu) {
                    case 'morning':
                        body = `[Role] 당신은 10년 경력의 단타 전문가입니다.\n[Instruction] 오늘 ${morningOpt.market} 시장의 ${morningOpt.newsType} 최신 뉴스를 검색하고, 주가에 영향 줄 핵심 종목 3개를 발굴해 매매 시나리오를 작성하세요.`;
                        break;
                    case 'recommend':
                        const sec = SECTORS.find(s=>s.id===recommendOpt.sector);
                        body = `[Role] ${sec.full} 전문 애널리스트\n[Instruction] ${recommendOpt.type} 스타일로 ${recommendOpt.count}개 종목을 추천하세요. 목표수익률 ${recommendOpt.growthRate}, 기간 ${recommendOpt.period} 기준입니다.`;
                        break;
                    case 'discovery':
                        body = `[Instruction] ${stockListStr} 종목에 대해 현재 주가, 밸류에이션, SWOT 분석 및 매수/매도 타이밍을 실시간 데이터를 바탕으로 심층 분석하세요.`;
                        break;
                    case 'fundamental':
                        body = `[Instruction] ${stockListStr}의 재무 건전성을 ${fundamentalOpt.analysisType}로 진단하세요. 특히 ${fundamentalOpt.focusArea} 지표의 5개년 트렌드와 수익성을 중점적으로 봅니다.`;
                        break;
                    case 'valuation':
                        body = `[Instruction] ${stockListStr}의 적정 주가를 ${valuationOpt.method}로 산출하세요. 안전마진 ${valuationOpt.safetyMargin}를 적용한 최종 목표 매수가를 제시하세요.`;
                        break;
                    case 'technical':
                        body = `[Instruction] ${stockListStr}의 ${technicalOpt.timeframe} 차트를 ${technicalOpt.indicator} 기반으로 분석하세요. 지지/저항 가격을 명확히 제시하고 ${technicalOpt.pattern} 패턴을 확인하세요.`;
                        break;
                    case 'qualitative':
                        body = `[Instruction] ${stockListStr}의 비재무적 요소인 ${qualitativeOpt.focus}을 심층 평가하세요. 장기적인 해자(Moat) 유무를 분석합니다.`;
                        break;
                    case 'risk':
                        body = `[Instruction] ${stockListStr}에 대해 ${riskOpt.scenario} 시나리오(Bull/Base/Bear) 분석을 수행하세요. 손절 기준 ${riskOpt.stopLoss}를 적용한 리스크 관리 계획을 세우세요.`;
                        break;
                    case 'portfolio':
                        body = `[Instruction] 자산 ${portfolioOpt.totalAmount}을 ${stockListStr}에 ${portfolioOpt.strategy}로 배분하는 포트폴리오 최적화 안을 제시하세요.`;
                        break;
                    case 'etf':
                        body = `[Instruction] ${stockListStr} ETF들을 ${etfOpt.goal} 관점에서 비교 분석하세요. 보수, 괴리율, 분배금 실시간 정보를 포함합니다.`;
                        break;
                    default: body = `${stockListStr} 종합 분석`;
                }

                const final = `${header}${body}\n\n[Output Format]\n1. 핵심 요약 테이블\n2. 상세 분석 내용\n3. 대응 가격(손절/익절) 수치 제시\n4. 미래 전망 ASCII 그래프 시각화`.trim();
                
                setGeneratedPrompt(final);
                setPromptHistory(prev => [{ id: Date.now(), menu: menus.find(m=>m.id===currentMenu).name, content: final, time: new Date().toLocaleTimeString() }, ...prev].slice(0, 10));
                setTimeout(() => document.getElementById('result-view')?.scrollIntoView({ behavior: 'smooth' }), 100);
            };

            // --- UI 컴포넌트 ---
            const OptionSelector = ({ label, options, value, onChange, cols = 2 }) => (
                <div className="mb-5">
                    <p className="text-[11px] font-black text-gray-400 dark:text-gray-500 mb-3 uppercase tracking-wider">{label}</p>
                    <div className={`grid gap-2 grid-cols-${cols}`}>
                        {options.map(opt => (
                            <button key={opt} onClick={() => onChange(opt)} className={`py-3 px-2 rounded-2xl text-xs font-bold border-2 transition-all ${value === opt ? 'bg-blue-600 border-blue-600 text-white shadow-lg' : 'bg-white dark:bg-gray-800 text-gray-500 border-gray-100 dark:border-gray-700 hover:border-gray-200'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                </div>
            );

            const CopyButton = ({ text }) => {
                const [copied, setCopied] = useState(false);
                const handleCopy = () => {
                    const el = document.createElement('textarea');
                    el.value = text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                };
                return (
                    <button onClick={handleCopy} className={`w-full py-4 rounded-2xl font-black transition-all shadow-xl active:scale-[0.98] ${copied ? 'bg-green-500 text-white' : 'bg-blue-600 text-white'}`}>
                        {copied ? '✅ 복사되었습니다!' : '📋 AI 프롬프트 복사'}
                    </button>
                );
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="sticky top-0 z-50 glass border-b dark:border-gray-800 px-4 py-4 flex justify-between items-center">
                        <h1 className="text-xl font-black bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent italic">STOCK AI PRO</h1>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-3 rounded-2xl bg-gray-100 dark:bg-gray-800 transition-transform active:scale-90">
                            {isDarkMode ? '☀️' : '🌙'}
                        </button>
                    </header>

                    {/* Navbar */}
                    <nav className="sticky top-[69px] z-40 overflow-x-auto scrollbar-hide px-4 py-3 glass border-b dark:border-gray-800 flex space-x-2">
                        {menus.map(m => (
                            <button key={m.id} onClick={() => {setCurrentMenu(m.id); setGeneratedPrompt('');}} className={`flex items-center space-x-1 px-5 py-2.5 rounded-2xl text-sm font-bold whitespace-nowrap transition-all border ${currentMenu === m.id ? 'tab-active' : 'bg-white dark:bg-gray-900 text-gray-400 border-gray-100 dark:border-gray-700'}`}>
                                <span>{m.icon}</span> <span>{m.name}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="max-w-xl mx-auto p-4 space-y-6 pb-40">
                        
                        {/* 종목 선택 영역 */}
                        {['discovery', 'fundamental', 'valuation', 'technical', 'qualitative', 'risk', 'portfolio', 'etf'].includes(currentMenu) && (
                            <section className="bg-white dark:bg-gray-900 rounded-[2rem] p-6 shadow-sm border dark:border-gray-800 animate-fade-in">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-sm font-black text-blue-500">📌 대상 선택</h3>
                                    {selectedStocks.length > 0 && <button onClick={clearStocks} className="text-xs text-red-500 font-bold">초기화</button>}
                                </div>
                                <div className="flex gap-2 mb-4">
                                    <input ref={inputRef} placeholder="종목/티커 직접 입력" className="flex-1 bg-gray-50 dark:bg-gray-800 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none border-none dark:text-white" onKeyPress={e=>e.key==='Enter'&&addCustomStock()} />
                                    <button onClick={addCustomStock} className="bg-gray-900 dark:bg-blue-600 text-white px-6 rounded-2xl text-sm font-bold active:scale-95 transition">추가</button>
                                </div>
                                <div className="flex flex-wrap gap-2 mb-4">
                                    {(currentMenu === 'etf' ? ETF_LIST.map(e=>e.name) : [...KOREA_STOCKS, ...US_STOCKS]).map(s => (
                                        <button key={s} onClick={() => toggleStock(s)} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all border ${selectedStocks.includes(s) ? 'bg-blue-600 border-blue-600 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-400 border-transparent hover:bg-gray-200'}`}>{s}</button>
                                    ))}
                                </div>
                                {selectedStocks.length > 0 && (
                                    <div className="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-2xl flex flex-wrap gap-2">
                                        {selectedStocks.map(s => (
                                            <span key={s} className="bg-white dark:bg-gray-800 px-3 py-1.5 rounded-lg text-xs font-black text-blue-600 dark:text-blue-400 shadow-sm flex items-center">
                                                {s} <button onClick={()=>toggleStock(s)} className="ml-2 text-gray-300">×</button>
                                            </span>
                                        ))}
                                    </div>
                                )}
                            </section>
                        )}

                        {/* 메뉴별 상세 설정 영역 */}
                        <section className="bg-white dark:bg-gray-900 rounded-[2rem] p-6 shadow-sm border dark:border-gray-800 animate-fade-in">
                            {currentMenu === 'morning' && (
                                <div className="space-y-2">
                                    <OptionSelector label="🗞️ 뉴스 테마" options={['정치테마','기업공시','글로벌이슈','테마급등']} value={morningOpt.newsType} onChange={v=>setMorningOpt({...morningOpt, newsType:v})} />
                                    <OptionSelector label="🌍 시장 범위" options={['한국','미국','전체']} value={morningOpt.market} onChange={v=>setMorningOpt({...morningOpt, market:v})} cols={3} />
                                </div>
                            )}
                            {currentMenu === 'recommend' && (
                                <div className="space-y-2">
                                    <OptionSelector label="🎯 섹터" options={SECTORS.map(s=>s.name)} value={SECTORS.find(s=>s.id===recommendOpt.sector).name} onChange={v=>setRecommendOpt({...recommendOpt, sector: SECTORS.find(s=>s.name===v).id})} cols={4} />
                                    <OptionSelector label="💎 스타일" options={['성장주','가치주','배당주']} value={recommendOpt.type} onChange={v=>setRecommendOpt({...recommendOpt, type:v})} cols={3} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <OptionSelector label="📅 기간" options={['3개월','6개월','1년']} value={recommendOpt.period} onChange={v=>setRecommendOpt({...recommendOpt, period:v})} cols={1} />
                                        <OptionSelector label="🔢 개수" options={['3개','5개','10개']} value={recommendOpt.count} onChange={v=>setRecommendOpt({...recommendOpt, count:v})} cols={1} />
                                    </div>
                                </div>
                            )}
                            {currentMenu === 'fundamental' && (
                                <div className="space-y-2">
                                    <OptionSelector label="📊 분석 유형" options={['종합분석','비교분석','심층분석']} value={fundamentalOpt.analysisType} onChange={v=>setFundamentalOpt({...fundamentalOpt, analysisType:v})} cols={3} />
                                    <OptionSelector label="🔍 집중 지표" options={['ROE','안정성','성장성']} value={fundamentalOpt.focusArea} onChange={v=>setFundamentalOpt({...fundamentalOpt, focusArea:v})} cols={3} />
                                </div>
                            )}
                            {currentMenu === 'valuation' && (
                                <div className="space-y-2">
                                    <OptionSelector label="⚖️ 평가 방법" options={['상대가치','절대가치','종합']} value={valuationOpt.method} onChange={v=>setValuationOpt({...valuationOpt, method:v})} cols={3} />
                                    <OptionSelector label="🛡️ 안전 마진" options={['10%','20%','30%','40%']} value={valuationOpt.safetyMargin} onChange={v=>setValuationOpt({...valuationOpt, safetyMargin:v})} cols={4} />
                                </div>
                            )}
                            {currentMenu === 'technical' && (
                                <div className="space-y-2">
                                    <OptionSelector label="📈 보조 지표" options={['이동평균','모멘텀','거래량']} value={technicalOpt.indicator} onChange={v=>setTechnicalOpt({...technicalOpt, indicator:v})} cols={3} />
                                    <OptionSelector label="⏱️ 차트 주기" options={['일봉','주봉','월봉']} value={technicalOpt.timeframe} onChange={v=>setTechnicalOpt({...technicalOpt, timeframe:v})} cols={3} />
                                </div>
                            )}
                            {currentMenu === 'qualitative' && (
                                <OptionSelector label="🧠 질적 요소" options={['경쟁우위','경영진','ESG']} value={qualitativeOpt.focus} onChange={v=>setQualitativeOpt({...qualitativeOpt, focus:v})} cols={3} />
                            )}
                            {currentMenu === 'risk' && (
                                <div className="space-y-2">
                                    <OptionSelector label="🌪️ 시나리오" options={['3가지','5가지','7가지']} value={riskOpt.scenario} onChange={v=>setRiskOpt({...riskOpt, scenario:v})} cols={3} />
                                    <OptionSelector label="🛑 손절 기준" options={['10%','15%','20%','25%']} value={riskOpt.stopLoss} onChange={v=>setRiskOpt({...riskOpt, stopLoss:v})} cols={4} />
                                </div>
                            )}
                            {currentMenu === 'portfolio' && (
                                <div className="space-y-2">
                                    <OptionSelector label="💵 가용 자산" options={['1000만원','5000만원','1억원']} value={portfolioOpt.totalAmount} onChange={v=>setPortfolioOpt({...portfolioOpt, totalAmount:v})} cols={3} />
                                    <OptionSelector label="🧬 배분 전략" options={['균등분산','차등배분','집중투자']} value={portfolioOpt.strategy} onChange={v=>setPortfolioOpt({...portfolioOpt, strategy:v})} cols={3} />
                                </div>
                            )}
                            {currentMenu === 'etf' && (
                                <div className="space-y-2">
                                    <OptionSelector label="🏦 투자 목표" options={['장기투자','배당수익','단기트레이딩']} value={etfOpt.goal} onChange={v=>setEtfOpt({...etfOpt, goal:v})} cols={3} />
                                    <OptionSelector label="📊 운용 스타일" options={['패시브','액티브','테마']} value={etfOpt.style} onChange={v=>setEtfOpt({...etfOpt, style:v})} cols={3} />
                                </div>
                            )}

                            {/* 용어 사전 UI (원본 데이터 유지) */}
                            {currentMenu === 'terms' && (
                                <div className="space-y-4">
                                    <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-2">
                                        {Object.keys(TERMS).map(cat => (
                                            <button key={cat} onClick={() => {setTermCategory(cat); setExpandedTerm(null);}} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition ${termCategory === cat ? 'bg-blue-600 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-400'}`}>
                                                {cat.toUpperCase()}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="divide-y dark:divide-gray-800">
                                        {TERMS[termCategory].map((t, i) => (
                                            <div key={i} className="py-4">
                                                <div onClick={() => setExpandedTerm(expandedTerm === i ? null : i)} className="flex justify-between items-center cursor-pointer group">
                                                    <span className="font-bold text-blue-600 dark:text-blue-400 group-hover:underline">{t.term} <small className="text-gray-400 font-normal">({t.full})</small></span>
                                                    <span className="text-gray-300">{expandedTerm === i ? '▲' : '▼'}</span>
                                                </div>
                                                {expandedTerm === i && (
                                                    <div className="mt-3 p-4 bg-gray-50 dark:bg-gray-950 rounded-2xl text-[11px] leading-relaxed text-gray-500 animate-fade-in">
                                                        <p className="mb-2 font-bold text-gray-800 dark:text-gray-200 text-sm">💡 {t.desc}</p>
                                                        <p className="whitespace-pre-line text-gray-600 dark:text-gray-400">{t.detail}</p>
                                                        {t.example && (
                                                            <div className="mt-3 p-3 bg-indigo-50 dark:bg-indigo-900/30 rounded-xl border border-indigo-100 dark:border-indigo-800">
                                                                <p className="text-indigo-600 dark:text-indigo-300 font-black italic">🌟 초간단 예시:</p>
                                                                <p className="text-indigo-500 dark:text-indigo-200">{t.example}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {currentMenu !== 'terms' && (
                                <button onClick={generatePrompt} className="w-full mt-6 bg-gradient-to-r from-blue-600 to-purple-600 text-white py-5 rounded-2xl font-black shadow-xl transform active:scale-[0.98] transition-all">
                                    ✨ RICE 프롬프트 생성하기
                                </button>
                            )}
                        </section>

                        {/* 결과 및 히스토리 영역 */}
                        {generatedPrompt && (
                            <div id="result-view" className="animate-fade-in">
                                <div className={`p-6 rounded-[2.5rem] border-4 border-blue-500 shadow-2xl ${isDarkMode ? 'bg-gray-900' : 'bg-white'}`}>
                                    <h3 className="font-black text-xl italic mb-5 flex items-center">
                                        <span className="flex h-3 w-3 rounded-full bg-blue-500 mr-3 animate-ping"></span>
                                        PROMPT READY
                                    </h3>
                                    <textarea readOnly value={generatedPrompt} className={`w-full h-72 p-6 rounded-3xl text-[11px] font-mono leading-relaxed mb-6 border-none outline-none resize-none shadow-inner ${isDarkMode ? 'bg-gray-950 text-gray-400' : 'bg-gray-50 text-gray-600'}`} />
                                    <CopyButton text={generatedPrompt} />
                                </div>
                            </div>
                        )}

                        {promptHistory.length > 0 && (
                            <section className="mt-10 opacity-60 hover:opacity-100 transition-opacity">
                                <h3 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-4 px-2">Recent History</h3>
                                <div className="space-y-3">
                                    {promptHistory.map(h => (
                                        <div key={h.id} onClick={() => {setGeneratedPrompt(h.content); window.scrollTo({top: 0, behavior: 'smooth'});}} className="p-5 bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-700 text-xs cursor-pointer hover:border-blue-400 transition-all flex justify-between items-center group">
                                            <div className="flex flex-col">
                                                <span className="font-bold text-gray-700 dark:text-gray-300">{h.menu}</span>
                                                <span className="text-[10px] text-gray-400 mt-1">{h.time}</span>
                                            </div>
                                            <span className="text-blue-500 font-bold opacity-0 group-hover:opacity-100 italic transition-opacity">LOAD →</span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}
                    </main>

                    <footer className="text-center py-20 opacity-20 text-[10px] font-black uppercase tracking-[0.4em] dark:text-white">
                        © REAL LEADERSHIP | Shin Juil<br/>
                        AI-DRIVEN STOCK ANALYSIS PRO v2.0
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
